name: Entry Executor

on:
  schedule:
    # 14:35 UTC = 10:35 AM EDT (summer) — 5 min after ORB closes
    # 15:35 UTC = 10:35 AM EST (winter) — entry_executor exits early if before 10:30 AM ET
    - cron: '35 14 * * 1-5'
    - cron: '35 15 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regime filter
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python regime_filter.py

      - name: Entry executor
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python entry_executor.py

      - name: Commit state
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@github-actions"
          for f in watchlist.json setup_scores.json regime.json trades.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --staged --quiet || git commit -m "entry: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
